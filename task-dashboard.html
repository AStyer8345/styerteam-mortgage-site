<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Task Command Center</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--blue:#4c7ec9;--green:#4cc98a;--red:#c94c4c;
  --orange:#c9884c;--purple:#9b4cc9;--teal:#4cc9c9;
  --bg:#0a0a0c;--bg2:#111115;--bg3:#18181e;--bg4:#1e1e26;
  --border:#ffffff12;--border2:#ffffff1a;
  --text:#f0ede8;--muted:#888;--dim:#555;
  --font-display:"Syne",sans-serif;--font-mono:"DM Mono",monospace;--font-body:"DM Sans",sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh}
.bg-grid{pointer-events:none;z-index:0;background-image:linear-gradient(#c9a84c08 1px,transparent 1px),linear-gradient(90deg,#c9a84c08 1px,transparent 1px);background-size:48px 48px;position:fixed;inset:0}

/* Header */
.header{z-index:100;backdrop-filter:blur(16px);border-bottom:1px solid var(--border);background:#0a0a0ceb;position:sticky;top:0}
.header-inner{display:flex;justify-content:space-between;align-items:center;max-width:1280px;margin:0 auto;padding:14px 24px}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{background:var(--gold);color:#0a0a0c;width:36px;height:36px;font-family:var(--font-display);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
.brand-name{font-family:var(--font-display);font-size:18px;font-weight:700}
.brand-sub{color:var(--muted);font-size:11px;font-family:var(--font-mono);letter-spacing:.05em}
.header-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border2);display:flex;align-items:center;gap:5px}
.pill-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Tabs */
.tabs-bar{z-index:90;position:sticky;top:65px;background:#0a0a0cf2;backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;padding:0 24px;overflow-x:auto;gap:0}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font-display);font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:14px 20px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Content */
.content{z-index:1;position:relative;max-width:1280px;margin:0 auto;padding:24px 24px 80px}
.tab-panel{display:none}.tab-panel.active{display:block}
.section-title{font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:4px}
.section-sub{color:var(--muted);font-size:12px;margin-bottom:20px;font-family:var(--font-mono)}

/* Filters */
.filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}

/* Report Cards */
.report-card{background:var(--bg2);border:1px solid var(--border);margin-bottom:8px;transition:all .15s;cursor:pointer}
.report-card:hover{border-color:var(--border2);background:var(--bg3)}
.report-header{display:flex;align-items:center;gap:12px;padding:14px 18px;flex-wrap:wrap}
.report-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-complete{background:var(--green)}.dot-progress{background:var(--gold)}.dot-failed{background:var(--red)}
.report-task{font-family:var(--font-display);font-size:13px;font-weight:700}
.report-project{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid;opacity:.7}
.proj-mortgage{color:var(--blue);border-color:#4c7ec94d}
.proj-loanos{color:var(--purple);border-color:#9b4cc94d}
.report-time{color:var(--muted);font-family:var(--font-mono);font-size:10px;margin-left:auto;white-space:nowrap}
.report-summary{color:var(--muted);font-size:12px;padding:0 18px 0 38px;line-height:1.5}
.report-details{display:none;padding:12px 18px 16px 38px;border-top:1px solid var(--border);margin-top:12px}
.report-details.open{display:block}
.detail-section{margin-bottom:12px}
.detail-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.detail-list{list-style:none;padding:0}
.detail-list li{font-size:12px;color:var(--text);padding:3px 0;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.detail-list li::before{content:"";flex-shrink:0;margin-top:5px}
.check-list li::before{width:6px;height:6px;border-radius:50%;background:var(--green)}
.warn-list li::before{width:6px;height:6px;border-radius:50%;background:var(--orange)}
.warn-list li.high::before{background:var(--red)}
.arrow-list li::before{width:6px;height:6px;border-radius:50%;background:var(--blue)}
.metrics-grid{display:flex;gap:16px;flex-wrap:wrap}
.metric-item{background:var(--bg);border:1px solid var(--border);padding:8px 14px}
.metric-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.metric-value{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--gold)}

/* Task Cards (project views) */
.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:24px}
.task-card{background:var(--bg2);border:1px solid var(--border);padding:16px;transition:all .15s}
.task-card:hover{border-color:var(--border2);background:var(--bg3)}
.tc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tc-name{font-family:var(--font-display);font-size:14px;font-weight:700}
.tc-freq{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--gold);color:var(--gold);opacity:.7}
.tc-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.tc-meta{display:flex;gap:12px;font-family:var(--font-mono);font-size:10px;color:var(--dim)}
.tc-meta span{display:flex;align-items:center;gap:4px}

/* Action Items Rollup */
.action-items{background:var(--bg2);border:1px solid var(--border);padding:16px;margin-bottom:24px}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.action-item:last-child{border-bottom:none}
.ai-priority{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;flex-shrink:0}
.ai-high{color:var(--red);border:1px solid #c94c4c4d}
.ai-medium{color:var(--orange);border:1px solid #c9884c4d}
.ai-low{color:var(--muted);border:1px solid var(--border)}
.ai-text{font-size:12px;line-height:1.4}

/* Inbox */
.inbox-item{background:var(--bg2);border:1px solid var(--border);padding:14px 18px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px}
.inbox-status{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid;flex-shrink:0}
.inbox-pending{color:var(--gold);border-color:#c9a84c4d}
.inbox-picked{color:var(--blue);border-color:#4c7ec94d}
.inbox-done{color:var(--green);border-color:#4cc98a4d}
.inbox-text{font-size:13px;line-height:1.4;flex:1}
.inbox-meta{font-family:var(--font-mono);font-size:10px;color:var(--dim);margin-top:4px}
.inbox-form{background:var(--bg2);border:1px solid var(--border);padding:18px;margin-bottom:20px}
.inbox-form textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;padding:10px;resize:vertical;min-height:60px}
.inbox-form select,.inbox-form button{margin-top:8px}
.inbox-form select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:6px 10px}
.inbox-form button{background:var(--gold);color:#0a0a0c;border:none;font-family:var(--font-display);font-size:12px;font-weight:700;padding:8px 20px;cursor:pointer;margin-left:8px}
.inbox-form button:hover{opacity:.85}
.json-output{background:var(--bg);border:1px solid var(--border);padding:12px;margin-top:12px;font-family:var(--font-mono);font-size:11px;color:var(--green);white-space:pre-wrap;display:none;position:relative}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:9px;padding:3px 8px;cursor:pointer}

/* Phase Progress */
.phase-bar{display:flex;gap:2px;margin-bottom:24px}
.phase-segment{flex:1;background:var(--bg2);border:1px solid var(--border);padding:12px;text-align:center}
.phase-segment.active-phase{border-color:var(--gold)}
.phase-num{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--gold)}
.phase-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* Attention Banner */
.attention-banner{background:linear-gradient(135deg,#c9884c12,#c94c4c12);border:1px solid #c9884c33;padding:16px 18px;margin-bottom:20px}
.attention-title{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:8px;color:var(--orange)}

/* Footer */
.dash-footer{text-align:center;padding:40px 24px;color:var(--dim);font-family:var(--font-mono);font-size:10px}
.dash-footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border)}
.dash-footer a:hover{color:var(--gold)}

/* Error */
.error-state{text-align:center;padding:60px 24px;color:var(--muted)}
.error-state h2{font-family:var(--font-display);color:var(--red);margin-bottom:12px}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);font-family:var(--font-mono);font-size:12px}

@media(max-width:768px){
  .header-inner{flex-direction:column;gap:10px;align-items:flex-start}
  .header-pills{width:100%}
  .tasks-grid{grid-template-columns:1fr}
  .report-header{gap:8px}
  .report-time{margin-left:0;width:100%}
  .phase-bar{flex-direction:column}
  .metrics-grid{flex-direction:column}
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">TC</div>
      <div>
        <div class="brand-name">Task Command Center</div>
        <div class="brand-sub" id="last-updated">Loading...</div>
      </div>
    </div>
    <div class="header-pills" id="header-pills"></div>
  </div>
</header>

<nav class="tabs-bar">
  <button class="tab-btn active" data-tab="activity">Activity Feed</button>
  <button class="tab-btn" data-tab="mortgage">Styer Mortgage</button>
  <button class="tab-btn" data-tab="loanos">LoanOS</button>
  <button class="tab-btn" data-tab="inbox">Inbox</button>
</nav>

<div class="content" id="app">
  <div class="loading">Loading task reports...</div>
</div>

<footer class="dash-footer">
  Reports auto-update when scheduled tasks run. Refresh to see latest.<br>
  <a href="ops.html">ops.html</a> &nbsp;&middot;&nbsp; <a href="loanos.html">loanos.html</a> &nbsp;&middot;&nbsp; <a href="dashboard.html">Content Dashboard</a>
</footer>

<script>
(function(){
  const APP = document.getElementById('app');

  // Relative time
  function timeAgo(ts){
    const d=new Date(ts),now=new Date(),s=Math.floor((now-d)/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    if(s<604800)return Math.floor(s/86400)+'d ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function projectBadge(p){
    if(p==='styer-mortgage') return '<span class="report-project proj-mortgage">Styer Mortgage</span>';
    if(p==='loanos') return '<span class="report-project proj-loanos">LoanOS</span>';
    return '<span class="report-project">'+p+'</span>';
  }

  function statusDot(s){
    if(s==='complete') return '<span class="report-dot dot-complete"></span>';
    if(s==='in-progress') return '<span class="report-dot dot-progress"></span>';
    return '<span class="report-dot dot-failed"></span>';
  }

  function getTask(tasks,id){ return tasks.find(t=>t.id===id)||{}; }

  function renderPills(data){
    const el=document.getElementById('header-pills');
    const today=new Date().toISOString().slice(0,10);
    const todayReports=data.reports.filter(r=>r.timestamp.slice(0,10)===today).length;
    const actionCount=data.reports.reduce((n,r)=>{
      return n+(r.actionItems?r.actionItems.length:0);
    },0);
    const pendingInbox=data.inbox.filter(i=>i.status==='pending').length;
    el.innerHTML=
      '<div class="pill"><span class="pill-dot" style="background:var(--blue)"></span>'+data.tasks.length+' Tasks</div>'+
      '<div class="pill"><span class="pill-dot" style="background:var(--green)"></span>'+todayReports+' Today</div>'+
      '<div class="pill"><span class="pill-dot" style="background:var(--orange)"></span>'+actionCount+' Actions</div>'+
      '<div class="pill"><span class="pill-dot" style="background:var(--gold)"></span>'+pendingInbox+' Inbox</div>';
  }

  // Activity Feed
  function renderActivity(data,filter){
    filter=filter||'all';
    let reports=data.reports.slice().sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    if(filter!=='all') reports=reports.filter(r=>{
      const t=getTask(data.tasks,r.taskId);
      return t.project===filter;
    });
    // Attention banner
    const allActions=[];
    data.reports.forEach(r=>{
      if(r.actionItems) r.actionItems.forEach(a=>{
        allActions.push({...a,taskId:r.taskId});
      });
    });
    let html='';
    if(allActions.length>0){
      html+='<div class="attention-banner"><div class="attention-title">Needs Your Attention ('+allActions.length+')</div>';
      allActions.forEach(a=>{
        html+='<div class="action-item"><span class="ai-priority ai-'+a.priority+'">'+a.priority+'</span><span class="ai-text">'+a.text+'</span></div>';
      });
      html+='</div>';
    }
    html+='<div class="filters">';
    html+='<button class="filter-btn'+(filter==='all'?' active':'')+'" data-filter="all">All</button>';
    html+='<button class="filter-btn'+(filter==='styer-mortgage'?' active':'')+'" data-filter="styer-mortgage">Styer Mortgage</button>';
    html+='<button class="filter-btn'+(filter==='loanos'?' active':'')+'" data-filter="loanos">LoanOS</button>';
    html+='</div>';
    if(reports.length===0){
      html+='<div class="loading">No reports found for this filter.</div>';
    }
    reports.forEach((r,i)=>{
      const task=getTask(data.tasks,r.taskId);
      html+='<div class="report-card" data-idx="'+i+'">';
      html+='<div class="report-header">';
      html+=statusDot(r.status);
      html+='<span class="report-task">'+task.name+'</span>';
      html+=projectBadge(task.project);
      html+='<span class="report-time">'+timeAgo(r.timestamp)+'</span>';
      html+='</div>';
      html+='<div class="report-summary">'+r.summary+'</div>';
      html+='<div class="report-details" id="detail-'+i+'">';
      if(r.completed&&r.completed.length){
        html+='<div class="detail-section"><div class="detail-label">Completed</div><ul class="detail-list check-list">';
        r.completed.forEach(c=>{ html+='<li>'+c+'</li>'; });
        html+='</ul></div>';
      }
      if(r.actionItems&&r.actionItems.length){
        html+='<div class="detail-section"><div class="detail-label">Action Items</div><ul class="detail-list warn-list">';
        r.actionItems.forEach(a=>{ html+='<li class="'+a.priority+'">'+a.text+' <span class="ai-priority ai-'+a.priority+'">'+a.priority+'</span></li>'; });
        html+='</ul></div>';
      }
      if(r.nextSteps&&r.nextSteps.length){
        html+='<div class="detail-section"><div class="detail-label">Next Steps</div><ul class="detail-list arrow-list">';
        r.nextSteps.forEach(n=>{ html+='<li>'+n+'</li>'; });
        html+='</ul></div>';
      }
      if(r.metrics&&Object.keys(r.metrics).length){
        html+='<div class="detail-section"><div class="detail-label">Metrics</div><div class="metrics-grid">';
        Object.entries(r.metrics).forEach(([k,v])=>{
          html+='<div class="metric-item"><div class="metric-label">'+k.replace(/([A-Z])/g,' $1')+'</div><div class="metric-value">'+v+'</div></div>';
        });
        html+='</div></div>';
      }
      html+='</div></div>';
    });
    return html;
  }

  // Mortgage tab
  function renderMortgage(data){
    const tasks=data.tasks.filter(t=>t.project==='styer-mortgage');
    let html='<h2 class="section-title">Styer Mortgage</h2><div class="section-sub">styermortgage.com — All scheduled tasks and latest status</div>';
    html+='<div class="tasks-grid">';
    tasks.forEach(t=>{
      const latest=data.reports.filter(r=>r.taskId===t.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
      html+='<div class="task-card">';
      html+='<div class="tc-top"><span class="tc-name">'+t.name+'</span><span class="tc-freq">'+t.frequency+'</span></div>';
      html+='<div class="tc-desc">'+t.description+'</div>';
      if(latest){
        html+='<div class="report-summary" style="padding:0;margin-bottom:8px;font-size:11px">'+latest.summary+'</div>';
        html+='<div class="tc-meta"><span>'+statusDot(latest.status)+' '+latest.status+'</span><span>'+timeAgo(latest.timestamp)+'</span><span>'+t.schedule+'</span></div>';
      } else {
        html+='<div class="tc-meta"><span style="color:var(--dim)">No reports yet</span><span>'+t.schedule+'</span></div>';
      }
      html+='</div>';
    });
    html+='</div>';
    // Action items rollup
    const actions=[];
    data.reports.filter(r=>{const t=getTask(data.tasks,r.taskId);return t.project==='styer-mortgage';}).forEach(r=>{
      if(r.actionItems) r.actionItems.forEach(a=>actions.push({...a,task:getTask(data.tasks,r.taskId).name}));
    });
    if(actions.length){
      html+='<h3 class="section-title" style="font-size:16px;margin-top:12px">Action Items ('+actions.length+')</h3>';
      html+='<div class="action-items">';
      actions.forEach(a=>{
        html+='<div class="action-item"><span class="ai-priority ai-'+a.priority+'">'+a.priority+'</span><span class="ai-text">'+a.text+'</span></div>';
      });
      html+='</div>';
    }
    // Latest metrics
    const allMetrics={};
    data.reports.filter(r=>{const t=getTask(data.tasks,r.taskId);return t.project==='styer-mortgage';})
      .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))
      .forEach(r=>{
        if(r.metrics) Object.entries(r.metrics).forEach(([k,v])=>{if(!allMetrics[k])allMetrics[k]=v;});
      });
    if(Object.keys(allMetrics).length){
      html+='<h3 class="section-title" style="font-size:16px;margin-top:12px">Latest Metrics</h3>';
      html+='<div class="metrics-grid" style="margin-bottom:24px">';
      Object.entries(allMetrics).forEach(([k,v])=>{
        html+='<div class="metric-item"><div class="metric-label">'+k.replace(/([A-Z])/g,' $1')+'</div><div class="metric-value">'+v+'</div></div>';
      });
      html+='</div>';
    }
    return html;
  }

  // LoanOS tab
  function renderLoanOS(data){
    const tasks=data.tasks.filter(t=>t.project==='loanos');
    const phases=['Phase 1','Phase 2','Phase 3','Phase 4'];
    let html='<h2 class="section-title">LoanOS</h2><div class="section-sub">Loan origination platform — Module build progress</div>';
    html+='<div class="phase-bar">';
    phases.forEach(p=>{
      const count=tasks.filter(t=>t.schedule===p).length;
      const hasReports=tasks.filter(t=>t.schedule===p).some(t=>data.reports.some(r=>r.taskId===t.id));
      html+='<div class="phase-segment'+(hasReports?' active-phase':'')+'">';
      html+='<div class="phase-num">'+p+'</div>';
      html+='<div class="phase-label">'+count+' modules</div>';
      html+='</div>';
    });
    html+='</div>';
    html+='<div class="tasks-grid">';
    tasks.forEach(t=>{
      const latest=data.reports.filter(r=>r.taskId===t.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
      html+='<div class="task-card">';
      html+='<div class="tc-top"><span class="tc-name">'+t.name+'</span><span class="tc-freq">'+t.schedule+'</span></div>';
      html+='<div class="tc-desc">'+t.description+'</div>';
      if(latest){
        html+='<div class="report-summary" style="padding:0;margin-bottom:8px;font-size:11px">'+latest.summary+'</div>';
        html+='<div class="tc-meta"><span>'+statusDot(latest.status)+' '+latest.status+'</span><span>'+timeAgo(latest.timestamp)+'</span></div>';
      } else {
        html+='<div class="tc-meta"><span style="color:var(--dim)">Not started</span></div>';
      }
      html+='</div>';
    });
    html+='</div>';
    return html;
  }

  // Inbox tab
  function renderInbox(data){
    let html='<h2 class="section-title">Inbox</h2><div class="section-sub">Ideas and tasks for scheduled agents to pick up</div>';
    // Add idea form
    html+='<div class="inbox-form">';
    html+='<textarea id="inbox-idea" placeholder="Type your idea here..."></textarea><br>';
    html+='<select id="inbox-project"><option value="styer-mortgage">Styer Mortgage</option><option value="loanos">LoanOS</option></select>';
    html+='<button onclick="generateInboxJSON()">Generate JSON</button>';
    html+='<div class="json-output" id="json-output"><button class="copy-btn" onclick="copyJSON()">Copy</button><pre id="json-pre"></pre></div>';
    html+='</div>';
    html+='<div class="section-sub" style="margin-top:0;margin-bottom:16px;font-size:11px;color:var(--dim)">Add ideas above. Copy the JSON snippet and paste it into task-reports.json → inbox array. Your scheduled Claude Code tasks will check inbox items and pick them up.</div>';
    // Inbox items
    const items=data.inbox.slice().sort((a,b)=>{
      const order={pending:0,'picked-up':1,completed:2};
      return (order[a.status]||0)-(order[b.status]||0);
    });
    items.forEach(item=>{
      const statusClass=item.status==='pending'?'inbox-pending':item.status==='picked-up'?'inbox-picked':'inbox-done';
      html+='<div class="inbox-item">';
      html+='<span class="inbox-status '+statusClass+'">'+item.status+'</span>';
      html+='<div><div class="inbox-text">'+item.text+'</div>';
      html+='<div class="inbox-meta">'+projectBadge(item.project)+' &middot; Source: '+item.source+' &middot; '+timeAgo(item.addedAt)+'</div>';
      html+='</div></div>';
    });
    if(items.length===0){
      html+='<div class="loading">No inbox items. Add ideas above!</div>';
    }
    return html;
  }

  // Main render
  function render(data,activeTab,filter){
    activeTab=activeTab||'activity';
    let html='';
    html+='<div class="tab-panel'+(activeTab==='activity'?' active':'')+'" id="panel-activity">'+renderActivity(data,filter)+'</div>';
    html+='<div class="tab-panel'+(activeTab==='mortgage'?' active':'')+'" id="panel-mortgage">'+renderMortgage(data)+'</div>';
    html+='<div class="tab-panel'+(activeTab==='loanos'?' active':'')+'" id="panel-loanos">'+renderLoanOS(data)+'</div>';
    html+='<div class="tab-panel'+(activeTab==='inbox'?' active':'')+'" id="panel-inbox">'+renderInbox(data)+'</div>';
    APP.innerHTML=html;

    // Bind expand/collapse
    document.querySelectorAll('.report-card').forEach(card=>{
      card.addEventListener('click',function(){
        const idx=this.dataset.idx;
        const det=document.getElementById('detail-'+idx);
        if(det) det.classList.toggle('open');
      });
    });
    // Bind filters
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',function(){
        render(data,activeTab,this.dataset.filter);
      });
    });
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      const tab=this.dataset.tab;
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      const panel=document.getElementById('panel-'+tab);
      if(panel) panel.classList.add('active');
    });
  });

  // Generate inbox JSON
  window.generateInboxJSON=function(){
    const text=document.getElementById('inbox-idea').value.trim();
    if(!text){alert('Type an idea first');return;}
    const project=document.getElementById('inbox-project').value;
    const id='inbox-'+String(Date.now()).slice(-6);
    const obj={id:id,text:text,project:project,addedAt:new Date().toISOString(),status:'pending',pickedUpBy:null,source:'manual'};
    const pre=document.getElementById('json-pre');
    const out=document.getElementById('json-output');
    pre.textContent=JSON.stringify(obj,null,2);
    out.style.display='block';
  };
  window.copyJSON=function(){
    const text=document.getElementById('json-pre').textContent;
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.querySelector('.copy-btn');
      btn.textContent='Copied!';
      setTimeout(()=>{btn.textContent='Copy';},1500);
    });
  };

  // Load data
  fetch('task-reports.json')
    .then(r=>{if(!r.ok)throw new Error('Failed to load');return r.json();})
    .then(data=>{
      document.getElementById('last-updated').textContent='Last updated: '+new Date(data.lastUpdated).toLocaleString();
      renderPills(data);
      render(data,'activity','all');
      // Re-bind tabs with data
      document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.addEventListener('click',function(){
          render(data,this.dataset.tab,'all');
        });
      });
    })
    .catch(err=>{
      APP.innerHTML='<div class="error-state"><h2>Could not load task-reports.json</h2><p>Make sure task-reports.json exists in the same directory as this file.</p><p style="margin-top:8px;font-family:var(--font-mono);font-size:11px">'+err.message+'</p></div>';
    });
})();
</script>
</body>
</html>
