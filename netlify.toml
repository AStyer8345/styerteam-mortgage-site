[build]
  publish = "."

# ─── Secrets Scanning ─────────────────────────────────────────────────────────
# marketing-command-center.html contains a SHA256 password hash (PASS_HASH) for
# client-side auth on this internal tool page — not a real API secret.
# ops.html is an internal dashboard — no real secrets, but may contain IDs that
# pattern-match. Both pages are noindexed and not publicly linked.
# BUFFER_* env vars are vestigial (social posting migrated to direct LinkedIn/
# Facebook APIs) — their values don't appear in active code.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "marketing-command-center.html,ops.html,dashboard.html"
  SECRETS_SCAN_OMIT_KEYS = "BUFFER_ACCESS_TOKEN,BUFFER_FACEBOOK_PROFILE_ID,BUFFER_LINKEDIN_PROFILE_ID,Github_repo"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ─── Scheduled Functions (cron) ───────────────────────────────────────────────
# Uncomment one block and set the cron expression to enable automatic generation.
# Cron syntax is UTC. "0 14 * * 4" = every Thursday at 14:00 UTC (9 AM CDT).
#
# The scheduled function must call dispatch.js or the core generator directly.
# See: netlify/functions/scheduled-rate-update.js (example scaffold below)
#
# [[scheduled-functions]]
#   name = "scheduled-rate-update"
#   schedule = "0 14 * * 4"
#
# [[scheduled-functions]]
#   name = "scheduled-newsletter"
#   schedule = "0 14 * * 4"

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/marketing-command-center.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/refinance-calculator.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/loan-dashboard.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/marketing-content.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/loanos.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

